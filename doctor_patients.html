<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Patients</title>
  <link rel="stylesheet" href="doctor_patients.css" />
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="logo">
      <div class="logo-icon">+</div>
      <div>
        <h2>RuralCare</h2>
        <p>TELEMEDICINE PORTAL</p>
      </div>
    </div>

    <div class="view-as">
      <div class="role-switch">
        <div class="role active">
          <h4>🩺 Doctor</h4>
          <p>Manage patients</p>
        </div>
      </div>
    </div>

    <div class="profile">
      <div class="avatar">RS</div>
      <div>
        <h4>Dr. Rajesh Singh</h4>
        <p>General Physician</p>
      </div>
    </div>

    <nav>
      <p class="section-title">MAIN</p>
      <ul class="menu">
        <a href="doctor_overview.html" class="menu-item">🏠 Overview</a>
        <a href="doctor_consultation.html" class="menu-item">💬 Consultations</a>
        <a href="doctor_patients.html" class="menu-item active">👥 Patients</a>
      </ul>

      <p class="section-title">TOOLS</p>
      <ul class="menu">
        <a href="medical_records.html" class="menu-item">📄 Records</a>
      </ul>
    </nav>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="header">
      <h2>Patient List</h2>
      <input type="text" placeholder="Search patients..." class="search" id="searchInput" oninput="filterTable()"/>
    </div>

    <div class="content">

      <!-- TABLE CARD -->
      <div class="patients-card">

        <div class="card-header">
          <h3>Registered Patients</h3>
          <span id="totalCount">Loading…</span>
        </div>

        <table>
          <thead>
            <tr>
              <th>Patient</th>
              <th>Date</th>
              <th>Time</th>
              <th>Doctor</th>
              <th>Diagnosis</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="7" style="text-align:center; padding:40px; color:#94a3b8;">
                Loading patients…
              </td>
            </tr>
          </tbody>
        </table>

      </div>

    </div>

  </main>

</div>

<script>
  // ── Supabase config ──────────────────────────────
  const SUPABASE_URL      = 'https://zbfuqzkjvdiserqevanu.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpiZnVxemtqdmRpc2VycWV2YW51Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NjY5NzAsImV4cCI6MjA5MjU0Mjk3MH0.A-Av4EyOBDZ-42OMPX1pEQUYMtEvzwJNmKdCY9lJSIA';
  const SUPABASE_TABLE    = 'appointments';

  let allRecords = [];

  // Avatar color classes — matches existing CSS classes in doctor_patients.css
  const AV_COLORS = ['blue', 'purple', 'orange', 'green', 'red'];
  function avatarColor(i) { return AV_COLORS[i % AV_COLORS.length]; }

  function initials(name) {
    if (!name) return '??';
    return name.trim().split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function buildRow(rec, index) {
    const name      = rec.patient_name      || '—';
    const location  = rec.patient_location  || '—';
    const date      = rec.date              || '—';
    const time      = rec.time              || '—';
    const doctor    = rec.doctor            || '—';
    const diagnosis = rec.symptom_diagnosis || rec.symptom_list || '—';
    const severity  = rec.symptom_severity  || '';
    const status    = rec.status            || 'Confirmed';

    // Map status to badge classes already defined in doctor_patients.css
    let badgeClass = 'low';
    if (status.toLowerCase() === 'cancelled') badgeClass = 'high';
    else if (status.toLowerCase() === 'pending') badgeClass = 'medium';

    const diagText = diagnosis + (severity ? ` · ${severity}` : '');

    return `
      <tr>
        <td class="patient-info">
          <div class="avatar ${avatarColor(index)}">${initials(name)}</div>
          <div>
            <strong>${name}</strong>
            <p>${location}</p>
          </div>
        </td>
        <td>${date}</td>
        <td>${time}</td>
        <td>${doctor}</td>
        <td>${diagText}</td>
        <td><span class="badge ${badgeClass}">${status}</span></td>
        <td><button class="btn">Consult</button></td>
      </tr>
    `;
  }

  async function fetchPatients() {
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?select=*&order=created_at.desc`,
        {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          }
        }
      );

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `Error ${res.status}`);
      }

      allRecords = await res.json();
      renderTable(allRecords);

    } catch (err) {
      document.getElementById('tableBody').innerHTML = `
        <tr>
          <td colspan="7" style="text-align:center; padding:40px; color:#ef4444;">
            ⚠️ Failed to load: ${err.message}
          </td>
        </tr>`;
      document.getElementById('totalCount').textContent = 'Error';
    }
  }

  function renderTable(records) {
    document.getElementById('totalCount').textContent = `${records.length} total`;

    if (records.length === 0) {
      document.getElementById('tableBody').innerHTML = `
        <tr>
          <td colspan="7" style="text-align:center; padding:40px; color:#94a3b8;">
            No appointments found.
          </td>
        </tr>`;
      return;
    }

    document.getElementById('tableBody').innerHTML =
      records.map((r, i) => buildRow(r, i)).join('');
  }

  function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    if (!q) { renderTable(allRecords); return; }
    const filtered = allRecords.filter(r =>
      (r.patient_name      || '').toLowerCase().includes(q) ||
      (r.doctor            || '').toLowerCase().includes(q) ||
      (r.patient_location  || '').toLowerCase().includes(q) ||
      (r.symptom_diagnosis || '').toLowerCase().includes(q) ||
      (r.date              || '').toLowerCase().includes(q)
    );
    renderTable(filtered);
  }

  fetchPatients();
</script>

</body>
</html>
